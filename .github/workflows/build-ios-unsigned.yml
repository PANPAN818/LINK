name: Build unsigned iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and sync iOS
        run: |
          npm run build
          npx cap sync ios

      - name: Read iOS version
        id: version
        run: |
          version_code="$(sed -nE 's/^[[:space:]]*CURRENT_PROJECT_VERSION = ([^;]+);.*$/\1/p' ios/App/App.xcodeproj/project.pbxproj | head -n 1)"
          version_name="$(sed -nE 's/^[[:space:]]*MARKETING_VERSION = ([^;]+);.*$/\1/p' ios/App/App.xcodeproj/project.pbxproj | head -n 1)"
          test -n "$version_code"
          test -n "$version_name"
          printf 'version_code=%s\nversion_name=%s\n' "$version_code" "$version_name" >> "$GITHUB_OUTPUT"

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/BabyLinkDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            clean build

      - name: Package IPA
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          app="$RUNNER_TEMP/BabyLinkDerivedData/Build/Products/Release-iphoneos/App.app"
          test -d "$app"
          mkdir -p build/Payload
          cp -R "$app" build/Payload/BabyLink.app
          output="BabyLink-unsigned-$VERSION_NAME.ipa"
          (cd build && ditto -c -k --sequesterRsrc --keepParent Payload "$output")
          (cd build && shasum -a 256 "$output" | tee "$output.sha256")

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabyLink-unsigned-${{ steps.version.outputs.version_name }}
          path: |
            build/BabyLink-unsigned-${{ steps.version.outputs.version_name }}.ipa
            build/BabyLink-unsigned-${{ steps.version.outputs.version_name }}.ipa.sha256
          if-no-files-found: error
          retention-days: 14
