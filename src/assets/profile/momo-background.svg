<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" role="img" aria-label="soft gray profile background">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a9a98" />
      <stop offset="0.5" stop-color="#838482" />
      <stop offset="1" stop-color="#565957" />
    </linearGradient>
  </defs>
  <rect width="900" height="1400" fill="url(#wash)" />
  <g filter="url(#blur)" opacity="0.58">
    <rect x="-80" y="-40" width="420" height="980" rx="90" fill="#b8b8b5" />
    <rect x="590" y="80" width="330" height="910" rx="100" fill="#a6a6a4" />
    <rect x="210" y="770" width="520" height="470" rx="120" fill="#626561" />
  </g>
  <rect width="900" height="1400" fill="#6b6d69" opacity="0.22" />
</svg>