services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-link}
      POSTGRES_USER: ${POSTGRES_USER:-link}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-link}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-link}
      STATIC_DIR: /app/dist
      ACCESS_PAGE_PATH: /app/server/public/access.html
      RELEASE_DIR: /app/releases
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - releases:/app/releases
    networks:
      - private

  napcat:
    image: mlikiowa/napcat-docker@sha256:32891e1f5aa654ef84fb4fcfb1724b4d844a26c2fcb11519945e64e22d13e766
    restart: unless-stopped
    hostname: babylink-napcat
    mac_address: ${NAPCAT_MAC_ADDRESS:-02:42:4c:49:4e:4b}
    environment:
      NAPCAT_UID: "0"
      NAPCAT_GID: "0"
      ACCOUNT: ${NAPCAT_ACCOUNT:?NAPCAT_ACCOUNT is required}
      NAPCAT_QUICK_PASSWORD: ${NAPCAT_QUICK_PASSWORD:-}
      NAPCAT_QUICK_PASSWORD_MD5: ${NAPCAT_QUICK_PASSWORD_MD5:-}
    ports:
      - "127.0.0.1:6099:6099"
    volumes:
      - napcat_qq:/app/.config/QQ
      - napcat_config:/app/napcat/config
      - napcat_plugins:/app/napcat/plugins
      - ./private/napcat-machine-id:/etc/machine-id:ro
    shm_size: 256m
    networks:
      - private

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-babylink.top}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - private

networks:
  private:
    driver: bridge

volumes:
  postgres_data:
  releases:
  caddy_data:
  caddy_config:
  napcat_qq:
  napcat_config:
  napcat_plugins: